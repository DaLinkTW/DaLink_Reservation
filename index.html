        // 日期格式化 YYYY-MM-DD
        const formatDate = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        // 時間格式化處理 (處理從 Sheets 來的不同日期/時間格式)
        const formatTime = (input) => {
            if (!input) return "00:00";
            const str = String(input);
            if (str.includes('T')) { // 處理 ISO 格式
                const date = new Date(input);
                return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
            }
            return str;
        };

            const [notification, setNotification] = useState(null); // 通知訊息
            const [isAdmin, setIsAdmin] = useState(false); // 是否為管理者模式
            const [editingBooking, setEditingBooking] = useState(null); // 當前正在編輯的預約資料
			const [resourceStatuses, setResourceStatuses] = useState({}); // 紀錄實體資源借用狀態

            // 預約表單狀態
            const [formData, setFormData] = useState({
                resourceId: RESOURCES['room'][0].id,
                date: formatDate(new Date()),
                startTime: '09:00',
                endTime: '10:00',
                title: '',
                user: '',
                repeatType: 'none', // 週期類型：none, daily, weekly, monthly
                repeatCount: 1,      // 重複次數
				syncCalendar: false, // 預設不同步
				syncYear: new Date().getFullYear().toString(), // 預設當年
				syncProjectId: '' // 案名ID
            });

            // --- 通知處理 ---
            const showNotification = useCallback((message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            }, []);
						   
            // 切換頁籤
            const handleCategoryChange = (categoryId) => {
                if (activeCategory === categoryId) return;
                setActiveCategory(categoryId);
                setBookings([]); // 清空舊資料顯示讀取中
                setFormData(prev => ({
                    ...prev,
                    resourceId: RESOURCES[categoryId][0].id,
                    title: '',
                    user: ''
                }));
            };

            // ============================================================
            // 4. API 通訊 (Data Synchronization)
            // ============================================================
            const currentScriptUrl = SCRIPT_URLS[activeCategory]; // 從 Google Sheets 抓取資料

            const fetchBookings = async () => {
                if (!currentScriptUrl) {
                    setIsSyncing(false);
                    return; // 如果還沒設定 URL，則不抓取
                }
                setIsSyncing(true);
                try {
                    const response = await fetch(currentScriptUrl);
                    const rawData = await response.json();
                    
                    // 防呆：確保 rawData 為陣列，避免若 GAS 回傳錯誤物件而導致 rawData.map 拋出錯誤
                    const dataArray = Array.isArray(rawData) ? rawData : (rawData?.data && Array.isArray(rawData.data) ? rawData.data : []);

                    // 資料標準化，相容原有 roomId 與新的 resourceId
                    const normalizedData = dataArray.map(item => ({
                        id: String(item.id || item['編號'] || Math.random()),
                        resourceId: item.resourceId || item.roomId || item['會議室'] || item['資源'] || RESOURCES[activeCategory][0].id,
                        date: formatDate(item.date || item['日期']),
                        startTime: formatTime(item.startTime || item['開始時間']),
                        endTime: formatTime(item.endTime || item['結束時間']),
                        title: item.title || item['主題'] || '無標題',
                        user: item.user || item['預約者'] || '未知'
                    }));
                    setBookings(normalizedData);
                } catch (error) {
                    showNotification("資料同步失敗，請檢查網路連線", "error");
                } finally {
                    setIsSyncing(false);
                }
            };

            // 初始化與自動重新整理
            useEffect(() => {
                fetchBookings();
                const interval = setInterval(fetchBookings, 60000); // 每分鐘自動更新
                return () => clearInterval(interval);
            }, [activeCategory]); // 當頁籤切換時重新抓取

            // 同步目前資源借還狀態	
			useEffect(() => {
				const fetchStatus = async () => {
					if (!currentScriptUrl) return; // 確保有網址才執行
					try {
						const response = await fetch(`${currentScriptUrl}?type=status`);
						const data = await response.json();
						// 防呆：確保回傳是個物件，避免若為 null 會導致後續畫面取值拋出 TypeError 讓整個系統當機 (White Screen of Death)
						setResourceStatuses(data || {}); 
					} catch (error) {
						console.error("無法同步資源狀態:", error);
					}
				};
				fetchStatus();
			}, [currentScriptUrl]);
						
            // ============================================================
            // 5. 事件處理邏輯 (Event Handlers)
            // ============================================================

            // 切換導覽日期
            const navigateDate = (direction) => {
                const d = new Date(selectedDate);
                if (viewMode === 'daily') d.setDate(d.getDate() + direction);
                else { d.setMonth(d.getMonth() + direction); d.setDate(1); }
                setSelectedDate(formatDate(d));
            };

            const goToCurrent = () => setSelectedDate(formatDate(new Date()));

            // 管理者登入邏輯
            const toggleAdmin = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    showNotification("已登出管理者模式");
                } else {
                    const pwd = prompt("請輸入管理者密碼：");
                    if (pwd === ADMIN_PASSWORD) {
                        setIsAdmin(true);
                        showNotification("已進入管理者模式");
                    } else if (pwd !== null) {
                        showNotification("密碼錯誤", "error");
                    }
                }
            };

            // 衝突檢測邏輯：判斷同一會議室同一天，時間是否有重疊
            const checkConflict = (targetBooking, excludeId = null) => {
                const start = targetBooking.startTime;
                const end = targetBooking.endTime;
                const conflicts = bookings.filter(b => 
                    b.id !== excludeId &&
                    b.date === targetBooking.date && 
                    b.resourceId === targetBooking.resourceId &&
                    start < b.endTime && end > b.startTime
                );
                return conflicts.length > 0 ? conflicts[0] : null;
            };

            // 時間選擇邏輯優化：確保結束時間永遠大於開始時間
            const handleStartTimeChange = (newStartTime, isEdit = false) => {
                const target = isEdit ? editingBooking : formData;
                const setter = isEdit ? setEditingBooking : setFormData;
                let newEndTime = target.endTime;
                const startIdx = TIME_OPTIONS.indexOf(newStartTime);
                const endIdx = TIME_OPTIONS.indexOf(target.endTime);
                
                if (startIdx >= endIdx) {
                    // 自動設定結束時間為開始時間後 1 小時 (2格)
                    newEndTime = TIME_OPTIONS[startIdx + 2] || TIME_OPTIONS[startIdx + 1] || newStartTime;
                }
                setter({ ...target, startTime: newStartTime, endTime: newEndTime });
            };

            const handleEndTimeChange = (newEndTime, isEdit = false) => {
                const target = isEdit ? editingBooking : formData;
                const setter = isEdit ? setEditingBooking : setFormData;
                if (newEndTime <= target.startTime) {
                    showNotification("結束時間必須晚於開始時間", "error");
                    const idx = TIME_OPTIONS.indexOf(target.startTime);
                    newEndTime = TIME_OPTIONS[idx + 2] || TIME_OPTIONS[idx + 1] || target.startTime;
                }
                setter({ ...target, endTime: newEndTime });
            };

            // 送出新預約 (包含週期性處理)
            const handleSubmit = async (e) => {
                e.preventDefault();
                if(!currentScriptUrl) return showNotification("尚未設定此項目的 GAS 網址", "error");
                const { title, user, repeatType, repeatCount, date, startTime, endTime, syncCalendar, syncProjectId } = formData;
                const trimmedTitle = title.trim();
                const trimmedUser = user.trim();

                if (!trimmedTitle || !trimmedUser) return showNotification("請填寫主題與預約者", "error");
                if (startTime >= endTime) return showNotification("結束時間必須大於開始時間", "error");

                // 計算所有需要預約的日期
                const bookingDates = [];
                let current = new Date(date);
                const count = repeatType === 'none' ? 1 : repeatCount;
                
                for (let i = 0; i < count; i++) {
                    bookingDates.push(formatDate(current));
                    if (repeatType === 'daily') current.setDate(current.getDate() + 1);
                    else if (repeatType === 'weekly') current.setDate(current.getDate() + 7);
                    else if (repeatType === 'monthly') current.setMonth(current.getMonth() + 1);
                }

                // 批次檢核衝突
                const newBookingsToSubmit = [];
                for (const d of bookingDates) {
                    const tempBooking = { 
					...formData, 
					date: d, 
					title: trimmedTitle, 
					user: trimmedUser, 
					syncCalendar: syncCalendar, // 傳送同步標記
                    roomId: formData.resourceId, // 保持向後相容舊 GAS
					id: `${Date.now()}-${Math.random()}` };
                    const conflict = checkConflict(tempBooking);
                    if (conflict) return showNotification(`日期 ${d} 時段衝突：[${conflict.startTime}-${conflict.endTime}] ${conflict.title}`, "error");
                    newBookingsToSubmit.push(tempBooking);
                }

                setIsLoading(true);
                try {
                    // 迴圈送出請求至 GAS (Action: add)
                    for (const b of newBookingsToSubmit) {
                        await fetch(currentScriptUrl, { 
                            method: 'POST', 
                            mode: 'no-cors',
                            body: JSON.stringify({ action: 'add', data: b }) 
                        });
                    }
                    showNotification(`預約成功！共 ${newBookingsToSubmit.length} 筆`);
                    setTimeout(fetchBookings, 1000);
                    setFormData(prev => ({ ...prev, title: '', user: '', repeatType: 'none', repeatCount: 1 }));
                } catch (error) { 
                    showNotification('連線失敗', 'error'); 
                } finally { 
                    setIsLoading(false); 
                }
            };

            // 更新既有預約 (刪除舊的 + 新增新的)
            const handleUpdate = async () => {
                if (!editingBooking) return;
				
                // 權限防呆安全盾：若不是會議室 (room) 且不是管理員，則中斷
                if (activeCategory !== 'room' && !isAdmin) {
                    showNotification("安全限制：此項目僅限管理員進行修改", "error");
                    return;
                }
				
                const trimmedTitle = (editingBooking.title || '').trim();
                const trimmedUser = (editingBooking.user || '').trim();
                if (!trimmedTitle || !trimmedUser) return showNotification("欄位不可為空", "error");
                if (editingBooking.startTime >= editingBooking.endTime) return showNotification("結束時間必須大於開始時間", "error");
                const conflict = checkConflict(editingBooking, editingBooking.id);
                if (conflict) return showNotification(`修改衝突：[${conflict.startTime}-${conflict.endTime}] ${conflict.title}`, "error");

                // 保持向後相容
                const payload = { ...editingBooking, roomId: editingBooking.resourceId };

                setIsLoading(true);
                try {
                    // 先刪後加，確保 Sheets 中 ID 維持一致且資料更新
                    await fetch(currentScriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: String(editingBooking.id) }) });
                    await fetch(currentScriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'add', data: payload }) });
                    showNotification('資料已修改');
                    setEditingBooking(null);
                    setTimeout(fetchBookings, 1000);
                } catch (error) { showNotification('更新失敗', 'error'); } finally { setIsLoading(false); }
            };

            // 刪除預約 (僅限管理者)
            const handleDelete = async (id) => {
			
                // 權限檢查：非會議室項目且非管理員
                if (activeCategory !== 'room' && !isAdmin) {
                    showNotification("權限不足：此項目僅限管理員進行刪除", "error");
                    return;
                }
                			
                if (!confirm("確定要刪除這筆預約嗎？")) return;
                setIsSyncing(true);
                try {
                    await fetch(currentScriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', id: String(id) }) });
                    setTimeout(fetchBookings, 1000);
                    showNotification('已刪除');
                } catch (error) { showNotification('刪除失敗', 'error'); setIsSyncing(false); }
            };
			
			// 切換實體資源借用狀態
			const toggleResourceStatus = async (resId) => {
				if (!isAdmin) {
					showNotification("權限不足：僅限管理者可切換借出/歸還狀態", "error");
					return;
				}

				// 判斷新的狀態是什麼 (防呆處理，確保 resourceStatuses 不為空)
				const currentStatus = (resourceStatuses || {})[resId];
				const newStatus = currentStatus === 'borrowed' ? 'available' : 'borrowed';

				// 先更新前端畫面，讓使用者感覺操作順暢
				setResourceStatuses(prev => ({
					...(prev || {}),
					[resId]: newStatus
				}));

				// 狀態送到後端 GAS 儲存
				try {
					await fetch(currentScriptUrl, {
						method: 'POST',
						mode: 'no-cors',
						body: JSON.stringify({ 
							action: 'updateStatus', 
							data: { 
								resourceId: resId, 
								status: newStatus 
							} 
						})
					});
					showNotification("資源借用狀態已更新至資料庫");
				} catch (error) {
					// 如果 API 失敗，將畫面狀態還原
					setResourceStatuses(prev => ({
						...(prev || {}),
						[resId]: currentStatus
					}));
					showNotification("同步至資料庫失敗，請檢查網路", "error");
				}
			};
	
            // ============================================================
            // 6. 介面渲染 (View Rendering)
            // ============================================================

            // 計算目前選取日期的預約
            const todaysBookings = useMemo(() => {
                return bookings.filter(b => b.date === selectedDate).sort((a, b) => a.startTime.localeCompare(b.startTime));
            }, [bookings, selectedDate]);

            // 渲染月曆核心組件
            const renderMonthCalendar = () => {
                const baseDate = new Date(selectedDate);
                const year = baseDate.getFullYear();
                const month = baseDate.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                
                const days = [];
                // 補齊月初空白
                for (let i = 0; i < firstDay; i++) {
                    days.push({ day: null, dateStr: null });
                }
                // 填充當月日期
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    days.push({ day: d, dateStr });
                }

                return (
                    <div className="grid grid-cols-7 gap-px bg-slate-200 border rounded-xl overflow-hidden shadow-inner">
                        {['日','一','二','三','四','五','六'].map(d => (
                            <div key={d} className="bg-slate-50 py-3 text-center font-bold text-slate-400 text-xs uppercase tracking-wider">{d}</div>
                        ))}
                        {days.map((item, i) => {
                            const isToday = item.dateStr === formatDate(new Date());
                            const isSelected = item.dateStr === selectedDate;
                            const dayBookings = item.dateStr ? bookings.filter(b => b.date === item.dateStr).sort((a,b) => a.startTime.localeCompare(b.startTime)) : [];
                            
                            return (
                                <div 
                                    key={i} 
                                    onClick={() => {
                                        if (item.dateStr) {
                                            setSelectedDate(item.dateStr);
                                            setViewMode('daily');
                                        }
                                    }}
                                    className={`bg-white min-h-[100px] md:min-h-[120px] p-2 border-t border-r border-slate-100 relative transition-all cursor-pointer hover:bg-blue-50 group flex flex-col ${!item.day ? 'bg-slate-50/50' : ''}`}
                                >
                                    {item.day && (
                                        <>
                                            <span className={`text-xs font-bold w-7 h-7 flex items-center justify-center rounded-full shrink-0 transition-colors ${isToday ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 group-hover:text-blue-600'} ${isSelected ? 'ring-2 ring-blue-400 ring-offset-1' : ''}`}>
                                                {item.day}
                                            </span>
                                            <div className="flex-1 w-full overflow-y-auto no-scrollbar space-y-1 mt-2">
                                                {dayBookings.slice(0, 4).map(b => {
													const res = RESOURCES[activeCategory].find(r => r.id === b.resourceId);
													let shortName = '';
													if (res) {
														if (activeCategory === 'room') {
															shortName = res.name.replace(/會議室\s*/, '').split(' ')[0];
														} else if (activeCategory === 'car') {
															const match = res.name.match(/\((.*?)\)/);
															shortName = match ? match[1] : res.name.split(' ')[1];
														} else if (activeCategory === 'equipment') {
															shortName = res.name.split('（')[0].split('─')[0];
														} else if (activeCategory === 'easycard') {
															shortName = res.name.replace(/公務悠遊卡\s*/, '');
														}
													}
                                                    return (
                                                        <div key={b.id} className={`text-[10px] leading-tight px-1.5 py-1 rounded shadow-sm border truncate flex items-center gap-1 ${res ? res.color : 'bg-slate-100'}`}>
                                                            <div className={`w-1.5 h-1.5 rounded-full shrink-0 ${res?.dot || 'bg-slate-400'}`}></div>
                                                            <span className="font-bold">{shortName}</span> {b.startTime}-{b.endTime}
                                                        </div>
                                                    );
                                                })}
                                                {dayBookings.length > 4 && (
                                                    <div className="text-[9px] text-slate-400 text-center font-bold">+ {dayBookings.length - 4} 更多</div>
                                                )}
                                            </div>
                                        </>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const currentDisplayHeader = useMemo(() => {
                const d = new Date(selectedDate);
                return viewMode === 'daily' ? selectedDate : `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
            }, [selectedDate, viewMode]);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col max-w-7xl mx-auto w-full">
                    {/* --- 頂部標題區 (Header) --- */}
                    <header className="mb-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200 gap-6">
                        <div className="flex items-center gap-5 w-full md:w-auto">
                            <Icon name="calendar" size={70} isCustom={true} />
                            <div>
                                <h1 className="text-xl md:text-2xl font-black text-slate-800 tracking-tight">大林聯合建築師事務所</h1>
                                <div className="flex items-center gap-3 mt-1">
                                    <span className="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest">{CURRENT_VERSION}</span>
                                    <h2 className="text-slate-500 text-sm md:text-base font-medium">公司資源預約管理系統</h2>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center justify-center gap-4">
                            {/* 連線狀態指示 */}
                            <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-bold transition-colors ${isSyncing ? 'bg-amber-50 text-amber-600 border-amber-200' : currentScriptUrl ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-rose-50 text-rose-600 border-rose-200'}`}>
                                <Icon name={isSyncing ? "loader-2" : "cloud"} size={14} />
                                <span>{!currentScriptUrl ? "未設定網址" : isSyncing ? "同步中..." : "雲端連線正常"}</span>
                            </div>
                            {/* 管理者登入開關 */}
                            <button onClick={toggleAdmin} className={`flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm border ${isAdmin ? 'bg-indigo-600 text-white border-indigo-700' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-400'}`}>
                                <Icon name={isAdmin ? "unlock" : "lock"} size={14} />
                                {isAdmin ? "管理者模式" : "管理員登入"}
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        {/* --- 左側欄位：預約表單與公告 (Sidebar) --- */}
                        <aside className="lg:col-span-4 xl:col-span-3 space-y-6">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <h3 className="text-sm font-black text-slate-800 mb-6 flex items-center gap-2">
                                    <span className="w-1 h-5 bg-blue-600 rounded-full"></span>
                                    預約登記表
                                </h3>
                                <form onSubmit={handleSubmit} className="space-y-5">
                                    {/* 資源選擇 (動態切換) */}
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 uppercase ml-1">
                                            {CATEGORIES.find(c => c.id === activeCategory)?.label}預約選項
                                        </label>
                                        <select value={formData.resourceId} onChange={e => setFormData({...formData, resourceId: e.target.value})} className="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                                            {RESOURCES[activeCategory].map(res => <option key={res.id} value={res.id}>{res.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 uppercase ml-1">預約日期</label>
                                        <input type="date" value={formData.date} onChange={e => {setFormData({...formData, date: e.target.value}); setSelectedDate(e.target.value);}} className="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" />
                                    </div>
                                    {/* 時間區間 */}
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1.5">
                                            <label className="text-[11px] font-black text-slate-400 uppercase ml-1">開始時間</label>
                                            <select value={formData.startTime} onChange={e => handleStartTimeChange(e.target.value)} className="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                                                {TIME_OPTIONS.slice(0, -1).map(time => <option key={time} value={time}>{time}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[11px] font-black text-slate-400 uppercase ml-1">結束時間</label>
                                            <select value={formData.endTime} onChange={e => handleEndTimeChange(e.target.value)} className="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                                                {TIME_OPTIONS.slice(1).map(time => <option key={time} value={time}>{time}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    
                                    {/* --- 週期功能區區塊 --- */}
                                    <div className="p-4 bg-blue-50/50 rounded-2xl border border-blue-100 space-y-4">
                                        <div className="space-y-1.5">
                                            <label className="text-[11px] font-black text-blue-500 uppercase flex items-center gap-1.5">
                                                <Icon name="refresh" size={12} /> 重複預約週期
                                            </label>
                                            <select value={formData.repeatType} onChange={e => setFormData({...formData, repeatType: e.target.value})} className="w-full rounded-xl border-blue-200 border p-2.5 bg-white text-sm font-bold text-blue-700 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all">
                                                <option value="none">一次性預約</option>
                                                <option value="daily">每天重複</option>
                                                <option value="weekly">每週重複</option>
                                                <option value="monthly">每月重複</option>
                                            </select>
                                        </div>
                                        {formData.repeatType !== 'none' && (
                                            <div className="space-y-3 animate-in fade-in slide-in-from-top-2 duration-300">
                                                <label className="text-[11px] font-black text-blue-500 flex justify-between uppercase">
                                                    <span>重複次數</span>
                                                    <span className="bg-blue-600 text-white px-2 py-0.5 rounded text-[10px]">{formData.repeatCount} 次</span>
                                                </label>
                                                <input type="range" min="1" max="12" value={formData.repeatCount} onChange={e => setFormData({...formData, repeatCount: parseInt(e.target.value)})} className="w-full h-1.5 bg-blue-200 rounded-lg appearance-none cursor-pointer" />
                                                <p className="text-[10px] text-blue-400 italic font-medium leading-relaxed">預約範圍將從 {formData.date} 起算連續預約。</p>																																	
                                            </div>
                                        )}
                                    </div>

									{/* --- 同步 Google 日曆功能區 --- */}
									<div className="p-4 bg-emerald-50/50 rounded-2xl border border-emerald-100 space-y-4 mt-3">
										<div className="flex items-center justify-between">
											<label className="text-[11px] font-black text-emerald-600 uppercase flex items-center gap-1.5">
												<Icon name="calendar" size={12} /> 同步至Google日曆
											</label>
											<button 
												type="button"
												onClick={() => setFormData({...formData, syncCalendar: !formData.syncCalendar})}
												className={`w-10 h-5 flex items-center rounded-full p-1 transition-colors ${formData.syncCalendar ? 'bg-emerald-600' : 'bg-slate-300'}`}
											>
												<div className={`bg-white w-3 h-3 rounded-full shadow-md transform transition-transform ${formData.syncCalendar ? 'translate-x-5' : 'translate-x-0'}`}></div>
											</button>
										</div>

										{formData.syncCalendar && (
											<div className="space-y-3 animate-in fade-in slide-in-from-top-2 duration-300">
												{/* 第一層：年份 */}
												<div className="space-y-1">
													<label className="text-[10px] font-bold text-emerald-500 ml-1">選擇案號年份</label>
													<select 
														value={formData.syncYear} 
														onChange={e => setFormData({...formData, syncYear: e.target.value, syncProjectId: ''})}
														className="w-full rounded-xl border-emerald-200 border p-2 bg-white text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-emerald-500/20 transition-all"
													>
														{YEARS.map(y => <option key={y} value={y}>{y} 年</option>)}
                                                        <option value="Others">其他 (Others)</option>
													</select>
												</div>
												
												{/* 第二層：案號+案名 */}
												<div className="space-y-1">
													<label className="text-[10px] font-bold text-emerald-500 ml-1">案號 + 案名</label>
													<select 
														value={formData.syncProjectId} 
														onChange={e => setFormData({...formData, syncProjectId: e.target.value})}
														className="w-full rounded-xl border-emerald-200 border p-2 bg-white text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-emerald-500/20 transition-all"
													>
														<option value="">-- 請選擇專案 --</option>
														{(PROJECTS_DATA[formData.syncYear] || []).map(p => (
															<option key={p.id} value={p.id}>{p.id} {p.name}</option>
														))}
													</select>
												</div>
												<p className="text-[10px] text-emerald-400 font-medium leading-relaxed px-1 m-0">
												1.選取後將同步建立至Google日曆。<br/>
												2.如需增加可同步專案，需先於公司Google帳號建立日曆，再通知系統開發協助處理。
												</p>
											</div>
										)}
									</div>

                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 uppercase ml-1">預約事由</label>
                                        <input type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" placeholder="例：專案進度檢討會" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 uppercase ml-1">預約人資訊</label>
                                        <input type="text" value={formData.user} onChange={e => setFormData({...formData, user: e.target.value})} className="w-full rounded-xl border border-slate-200 p-3 bg-slate-50 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" placeholder="姓名 + 分機" />
                                    </div>
                                    <button 
                                        type="submit" 
                                        disabled={isLoading} 
                                        className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2 group"
                                    >
                                        {isLoading ? <Icon name="loader-2" size={20} /> : (
                                            <>
                                                <span>{formData.repeatType === 'none' ? '立即預約' : `批次預約登記 (${formData.repeatCount}筆)`}</span>
                                                <Icon name="chevron-right" size={16} className="group-hover:translate-x-1 transition-transform" />
                                            </>
                                        )}
                                    </button>
                                </form>
                            </div>

                            {/* --- 更新日誌區 (Logs) --- */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <div className="flex items-center gap-2 mb-4 text-slate-800 border-b border-slate-50 pb-3">
                                    <Icon name="info" size={18} className="text-blue-500" />
                                    <h3 className="text-sm font-black">更新公告</h3>
                                </div>
                                <div className="space-y-5 max-h-[200px] overflow-y-auto no-scrollbar">
                                    {VERSION_LOGS.map((log, idx) => (
                                        <div key={idx} className="relative pl-5 border-l-2 border-slate-100">
                                            <div className="absolute -left-[5px] top-0 w-2 h-2 bg-blue-500 rounded-full border-2 border-white"></div>
                                            <div className="flex items-center gap-2 mb-1.5">
                                                <span className="text-xs font-black text-blue-600">{log.version}</span>
                                                <span className="text-[10px] text-slate-400 font-bold">{log.date}</span>
                                            </div>
                                            <ul className="text-[11px] text-slate-500 space-y-1.5 font-medium leading-relaxed">
                                                {log.features.map((f, i) => <li key={i} className="flex gap-1.5"><span>•</span>{f}</li>)}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </aside>

                        {/* --- 右側欄位：預約狀況展示區 (Main Content) --- */}
                        <main className="lg:col-span-8 xl:col-span-9 flex flex-col"> 
                            
                            {/* --- 頁籤導覽區 (Category Tabs) --- */}
                            <div className="flex space-x-3 mb-6 overflow-x-auto no-scrollbar pb-1">
                                {CATEGORIES.map(category => (
                                    <button
                                        key={category.id}
                                        onClick={() => handleCategoryChange(category.id)}
                                        className={`flex items-center gap-2 px-6 py-3.5 rounded-xl font-bold text-sm transition-all whitespace-nowrap ${
                                            activeCategory === category.id
                                                ? 'bg-blue-600 text-white shadow-md shadow-blue-200 ring-2 ring-blue-600 ring-offset-2 ring-offset-slate-50'
                                                : 'bg-white text-slate-500 hover:text-blue-600 hover:bg-blue-50 border border-slate-200'
                                        }`}
                                    >
                                        <Icon name={category.icon} size={18} />
                                        {category.label}預約
                                    </button>
                                ))}
                            </div>

                            {/* --- 預約狀況白底區塊 --- */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                                {/* 切換視圖與日期導覽 */}
                                <div className="bg-slate-50/80 backdrop-blur-sm border-b border-slate-100 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="flex items-center gap-4">
                                        <h2 className="font-black text-slate-800 text-lg">預約狀況表</h2>
                                        <div className="px-4 py-1.5 bg-white text-blue-700 font-black text-sm rounded-full shadow-sm border border-slate-200 inline-flex items-center gap-2">
                                            <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                                            {currentDisplayHeader}
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-center gap-4 bg-slate-200/50 p-1.5 rounded-2xl">
                                        <div className="flex items-center bg-white rounded-xl shadow-sm p-1">
                                            <button onClick={() => navigateDate(-1)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors"><Icon name="chevron-left" size={18} /></button>
                                            <button onClick={goToCurrent} className="px-4 py-1 text-xs font-black text-slate-600 hover:text-blue-600 whitespace-nowrap">
                                                {viewMode === 'daily' ? '跳到今天' : '跳到本月'}
                                            </button>
                                            <button onClick={() => navigateDate(1)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors"><Icon name="chevron-right" size={18} /></button>
                                        </div>
                                        <div className="flex gap-1 bg-slate-200/50 p-1 rounded-xl">
                                            <button onClick={() => setViewMode('daily')} className={`px-5 py-2 text-xs font-black rounded-lg transition-all ${viewMode === 'daily' ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}>日</button>
                                            <button onClick={() => setViewMode('monthly')} className={`px-5 py-2 text-xs font-black rounded-lg transition-all ${viewMode === 'monthly' ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}>月</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 min-h-[500px]">
                                    {!currentScriptUrl && (
                                        <div className="flex flex-col items-center justify-center h-64 text-slate-400">
                                            <Icon name="info" size={48} className="mb-4 opacity-50" />
                                            <p className="font-bold">尚未綁定 {CATEGORIES.find(c => c.id === activeCategory)?.label} 的 Google Sheet 網址</p>
                                            <p className="text-xs mt-2">請系統管理員於程式碼 SCRIPT_URLS 進行設定</p>
                                        </div>
                                    )}

                                    {currentScriptUrl && viewMode === 'daily' ? (
                                        /* 日視圖內容：依資源分組 */
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in duration-300">
                                            {RESOURCES[activeCategory].map(res => {
                                                const resBookings = todaysBookings.filter(b => b.resourceId === res.id);
                                                // 保護屬性讀取避免當機
                                                const currentStatus = (resourceStatuses || {})[res.id]; 
                                                return (
                                                    <div key={res.id} className="bg-slate-50/50 rounded-2xl p-5 border border-slate-100 flex flex-col h-full">
                                                        <div className="flex items-center justify-between mb-4">
                                                            <h3 className={`text-[11px] font-black px-3 py-1 rounded-full border shadow-sm ${res.color}`}>{res.name}</h3>
															{activeCategory === 'room' ? (
																<span className="text-[10px] font-bold text-slate-400">{resBookings.length} 筆預約</span>
															) : (
																<button
																	onClick={() => toggleResourceStatus(res.id)}
																	className={`text-[10px] font-black px-2.5 py-1 rounded-md border transition-all ${
																		currentStatus === 'borrowed' 
																			? 'bg-rose-100 text-rose-600 border-rose-200 shadow-sm' 
																			: 'bg-emerald-100 text-emerald-600 border-emerald-200 shadow-sm'
																	} ${isAdmin ? 'cursor-pointer hover:scale-105' : 'cursor-default opacity-80'}`}
																>
																	{currentStatus === 'borrowed' ? '借用中' : '可借用'}
																</button>
															)}                                                        </div>
                                                        {resBookings.length === 0 ? (
                                                            <div className="flex-1 flex flex-col items-center justify-center py-10 opacity-30">
                                                                <Icon name={CATEGORIES.find(c => c.id === activeCategory)?.icon || "calendar"} size={32} />
                                                                <p className="text-xs font-bold mt-2">今日尚無預約</p>
                                                            </div>
                                                        ) : (
                                                            <div className="space-y-3">
                                                                {resBookings.map(b => (
                                                                    <div key={b.id} className="group relative bg-white p-4 rounded-xl border border-slate-100 shadow-sm hover:shadow-md hover:border-blue-200 transition-all">
                                                                        <div className="flex items-center gap-3 mb-2">
                                                                            <span className="text-[11px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">{b.startTime} - {b.endTime}</span>
                                                                        </div>
                                                                        <div className="text-sm font-black text-slate-700 truncate mb-1">{b.title}</div>
                                                                        <div className="flex items-center justify-between">
                                                                            <span className="text-[11px] text-slate-400 font-bold flex items-center gap-1">
                                                                                <div className="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                                                                                預約人：{b.user}
                                                                            </span>
																			{/* 權限核心修改：如果是「會議室」則全面開放修改、刪除按鈕；其餘分類則仍需要管理員權限 */}
                                                                            {(activeCategory === 'room' || isAdmin) && (
                                                                                <div className="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0">
                                                                                    <button onClick={() => setEditingBooking(b)} className="text-slate-400 hover:text-blue-500 p-1.5 bg-slate-50 rounded-lg hover:shadow-sm transition-all"><Icon name="edit" size={14} /></button>
                                                                                    <button onClick={() => handleDelete(b.id)} className="text-slate-400 hover:text-rose-500 p-1.5 bg-slate-50 rounded-lg hover:shadow-sm transition-all"><Icon name="x" size={14} /></button>
                                                                                </div>
                                                                            )}
                                                                        </div>																			  
                                                                    </div>
                                                            
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ) : currentScriptUrl && viewMode === 'monthly' ? (
                                        /* 月視圖內容：渲染整月日曆 */
                                        <div className="animate-in fade-in duration-500">
                                            {renderMonthCalendar()}
                                        </div>
                                    ) : null}

                                    <div className="mt-8 flex flex-col md:flex-row items-center justify-between gap-4 p-4 bg-rose-50 rounded-xl border border-rose-100">
                                        <div className="flex items-center gap-3 text-rose-600">
                                            <Icon name="info" size={20} />
											{/* 根據當前的 activeCategory 顯示對應的注意事項 */}
													<p className="text-xs md:text-sm font-black">
														{CATEGORY_NOTES[activeCategory] || "注意事項：如需異動或取消已登記預約，請聯繫各類別管理者協助處理。"}
													</p>
                                        </div>
                                    </div>								  
                                </div>
                            </div>
                        </main>
                    </div>

                    {/* --- 頁尾維護資訊 (Footer) --- */}
                    <footer className="mt-12 pt-8 border-t border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-8 pb-10">
                        <div className="space-y-4">
                            <h4 className="text-sm font-black text-slate-800 uppercase tracking-widest">系統開發與維護</h4>
                            <div className="flex gap-8">
                                <div className="space-y-1">
                                    <p className="text-[11px] text-slate-400 font-black underline decoration-2 underline-offset-4">系統開發</p>
                                    <p className="text-xs text-slate-600 font-bold">吳書緯 (分機 731) / 許卓嘉 (分機 734)</p>
                                </div>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <h4 className="text-sm font-black text-slate-800 uppercase tracking-widest">各類別管理者</h4>
                            <div className="grid grid-cols-3 gap-6">
                                <div className="space-y-1">
                                    <p className="text-[11px] text-blue-400 font-black underline decoration-2 underline-offset-4">會議設備/公務車/公務悠構卡</p>
                                    <div className="text-[10px] text-slate-500 font-bold grid grid-cols-1 gap-1">
                                        <span>劉珏妏 (分機 169)</span>		
                                    </div>
                                </div>
                            </div>
                        </div>
                    </footer>

                    {/* --- 管理者編輯彈出視窗 (Edit Modal) --- */}
                    {editingBooking && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="bg-indigo-600 px-6 py-5 text-white flex justify-between items-center">
                                    <h3 className="font-black">修改預約資料</h3>
                                    <button onClick={() => setEditingBooking(null)} className="p-2 hover:bg-white/20 rounded-xl transition-colors"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-8 space-y-5">
                                    {/* 編輯表單欄位 */}
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 uppercase">預約項目</label>
                                        <select value={editingBooking.resourceId} onChange={e => setEditingBooking({...editingBooking, resourceId: e.target.value})} className="w-full border rounded-xl p-3 text-sm font-bold bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all">
                                            {RESOURCES[activeCategory].map(res => <option key={res.id} value={res.id}>{res.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 uppercase">預約日期</label>
                                        <input type="date" value={editingBooking.date} onChange={e => setEditingBooking({...editingBooking, date: e.target.value})} className="w-full border rounded-xl p-3 text-sm font-bold bg-slate-50 focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="text-[11px] font-black text-slate-400 uppercase">開始</label>
                                            <select value={editingBooking.startTime} onChange={e => handleStartTimeChange(e.target.value, true)} className="w-full border rounded-xl p-3 text-sm font-bold bg-slate-50 outline-none transition-all">
                                                {TIME_OPTIONS.slice(0, -1).map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[11px] font-black text-slate-400 uppercase">結束</label>
                                            <select value={editingBooking.endTime} onChange={e => handleEndTimeChange(e.target.value, true)} className="w-full border rounded-xl p-3 text-sm font-bold bg-slate-50 outline-none transition-all">
                                                {TIME_OPTIONS.slice(1).map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 uppercase">預約事由</label>
                                        <input type="text" value={editingBooking.title} onChange={e => setEditingBooking({...editingBooking, title: e.target.value})} className="w-full border rounded-xl p-3 text-sm font-bold bg-slate-50 outline-none transition-all" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] font-black text-slate-400 uppercase">預約者</label>
                                        <input type="text" value={editingBooking.user} onChange={e => setEditingBooking({...editingBooking, user: e.target.value})} className="w-full border rounded-xl p-3 text-sm font-bold bg-slate-50 outline-none transition-all" />
                                    </div>
                                    {/* ... 其他編輯欄位比照主表單 ... */}
                                    <div className="flex gap-4 pt-6">
                                        <button onClick={() => setEditingBooking(null)} className="flex-1 py-3 text-slate-500 font-black hover:bg-slate-100 rounded-xl transition-colors">取消</button>
                                        <button onClick={handleUpdate} disabled={isLoading} className="flex-1 py-3 bg-indigo-600 text-white font-black rounded-xl shadow-lg hover:bg-indigo-700 transition-all">確認儲存</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- 全域通知元件 (Toast) --- */}
                    {notification && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 md:left-auto md:right-8 md:translate-x-0 px-8 py-4 rounded-2xl shadow-2xl text-white font-black z-[110] animate-in slide-in-from-bottom-10 duration-500 flex items-center gap-3 ${notification.type === 'error' ? 'bg-rose-500 shadow-rose-200' : 'bg-emerald-600 shadow-emerald-200'}`}>
                            <Icon name={notification.type === 'error' ? 'x' : 'info'} size={20} />
                            {notification.message}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
